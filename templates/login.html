<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V-flow · 登录</title>
  <style>
    :root {
      --bg:        oklch(0.165 0.006 75);
      --surface:   oklch(0.205 0.006 75);
      --line:      oklch(0.96 0.004 90 / 0.10);
      --ink:       oklch(0.96 0.004 90);
      --ink-2:     oklch(0.78 0.006 80);
      --ink-3:     oklch(0.60 0.006 80);
      --accent:    oklch(0.84 0.13 70);
      --accent-ink:oklch(0.20 0.02 70);
      --error:     oklch(0.78 0.15 25);
      --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-sans);
      background: var(--bg); color: var(--ink);
      min-height: 100vh; display: grid; place-items: center;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: min(360px, 90vw);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 36px 32px 32px;
    }
    .brand { font-weight: 700; font-size: 1.2rem; letter-spacing: -0.02em; }
    .brand b { color: var(--accent); }
    .sub { color: var(--ink-3); font-size: 0.8rem; margin: 4px 0 28px; }
    label { display: block; font-size: 0.8rem; color: var(--ink-2); margin: 0 0 6px 2px; }
    .field { margin-bottom: 18px; }
    input {
      width: 100%; height: 42px; padding: 0 14px;
      background: var(--bg); color: var(--ink);
      border: 1px solid var(--line); border-radius: 8px;
      font: inherit; outline: none;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%; height: 44px; margin-top: 6px;
      background: var(--accent); color: var(--accent-ink);
      border: none; border-radius: 8px; font-weight: 600;
      cursor: pointer; transition: filter .15s;
    }
    button:hover { filter: brightness(1.06); }
    .error { color: var(--error); font-size: 0.82rem; margin-bottom: 14px; }
  </style>
</head>
<body>
  <form class="card" method="post"
        action="{{ url_for('vflow.login') }}{% if request.args.get('next') %}?next={{ request.args.get('next')|urlencode }}{% endif %}">
    <div class="brand">V<b>·</b>flow</div>
    <div class="sub">本地视频库 · 请登录</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <div class="field">
      <label for="username">用户名</label>
      <input id="username" name="username" autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label for="password">密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button type="submit">登录</button>
  </form>
</body>
</html>
