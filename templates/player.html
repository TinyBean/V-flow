<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ name }} · V-flow</title>
  <style>
    :root {
      --bg:        oklch(0.165 0.006 75);
      --surface:   oklch(0.205 0.006 75);
      --surface-2: oklch(0.250 0.007 75);
      --line:      oklch(0.96 0.004 90 / 0.10);
      --ink:       oklch(0.96 0.004 90);
      --ink-2:     oklch(0.78 0.006 80);
      --ink-3:     oklch(0.60 0.006 80);
      --accent:    oklch(0.84 0.13 70);
      --accent-ink:oklch(0.20 0.02 70);
      --error:     oklch(0.78 0.15 25);
      --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      --radius: 10px;
      --radius-sm: 7px;
      --z-badge: 200;
      --z-spinner: 150;
      --z-drawer: 250;
      --z-err: 300;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    button { font: inherit; color: inherit; }

    /* ---------- page column ---------- */
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: clamp(16px, 4vw, 48px);
    }

    /* ---------- breadcrumb ---------- */
    .crumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; color: var(--ink-3);
      min-width: 0; overflow: hidden;
      margin-bottom: 16px;
    }
    .crumb__home { color: var(--ink-3); text-decoration: none; transition: color .15s ease; flex-shrink: 0; }
    .crumb__home:hover { color: var(--accent); }
    .crumb__seg { flex-shrink: 0; }
    .crumb__sep { color: var(--ink-3); opacity: .5; flex-shrink: 0; }
    .crumb__cur {
      color: var(--ink-2);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
    }

    /* ---------- video card ---------- */
    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 10px 40px oklch(0 0 0 / 0.25);
    }
    .card video {
      display: block;
      width: 100%;
      max-height: 72vh;
      background: #000;
      margin: 0 auto;
      object-fit: contain;
    }

    /* ---------- speed badge ---------- */
    .badge {
      position: absolute; top: 12px; right: 12px; z-index: var(--z-badge);
      background: var(--accent); color: var(--accent-ink);
      font-weight: 700; font-size: 0.82rem; letter-spacing: -0.01em;
      padding: 5px 11px; border-radius: var(--radius-sm);
      box-shadow: 0 6px 20px oklch(0 0 0 / 0.4);
      opacity: 0; transform: translateY(-4px) scale(0.96);
      transition: opacity .15s ease, transform .15s ease;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
    }
    .badge.show { opacity: 1; transform: none; }

    /* ---------- buffering spinner ---------- */
    .spinner {
      position: absolute; inset: 0; z-index: var(--z-spinner);
      display: none; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .spinner::before {
      content: ''; width: 46px; height: 46px;
      border: 3px solid oklch(0.96 0.004 90 / 0.22);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- info bar ---------- */
    .info {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 2px 0; flex-wrap: wrap;
    }
    .info__name {
      font-size: 0.95rem; font-weight: 600; letter-spacing: -0.01em;
      color: var(--ink);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
    }
    .info__tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .info__tags:empty { display: none; }
    .info__tags .t {
      font-size: 0.7rem; color: var(--ink-2);
      border: 1px solid var(--line); border-radius: 999px;
      padding: 3px 10px; line-height: 1.4;
      background: var(--surface-2);
    }
    .info__actions { margin-left: auto; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    /* ---------- auto-next toggle ---------- */
    .autonext {
      position: relative;
      display: inline-flex; align-items: center; gap: 8px;
      cursor: pointer; user-select: none;
      font-size: 0.78rem; color: var(--ink-2);
    }
    .autonext input { position: absolute; opacity: 0; width: 0; height: 0; }
    .autonext__track {
      width: 34px; height: 18px; border-radius: 999px;
      background: var(--surface-2); border: 1px solid var(--line);
      position: relative; flex-shrink: 0;
      transition: background .18s ease, border-color .18s ease;
    }
    .autonext__thumb {
      position: absolute; top: 1px; left: 1px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--ink-2);
      transition: transform .18s ease, background .18s ease;
    }
    .autonext input:checked + .autonext__track { background: var(--accent); border-color: var(--accent); }
    .autonext input:checked + .autonext__track .autonext__thumb { transform: translateX(16px); background: var(--accent-ink); }
    .autonext input:focus-visible + .autonext__track { outline: 2px solid var(--accent); outline-offset: 2px; }
    .autonext:hover .autonext__label { color: var(--ink); }

    /* ---------- buttons ---------- */
    .btn {
      appearance: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 13px; border-radius: 999px;
      background: transparent; border: 1px solid var(--line);
      color: var(--ink); font-size: 0.8rem;
      transition: background .18s ease, border-color .18s ease, color .18s ease;
      flex-shrink: 0; white-space: nowrap;
    }
    .btn:hover { background: var(--surface-2); }
    .btn svg { width: 14px; height: 14px; }
    .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn--primary {
      border-color: color-mix(in oklch, var(--accent) 55%, transparent);
      color: var(--accent);
    }
    .btn--primary:hover {
      background: color-mix(in oklch, var(--accent) 12%, transparent);
      border-color: var(--accent);
    }
    .btn--icon {
      padding: 7px; width: 32px; height: 32px; justify-content: center;
      color: var(--ink-2);
    }
    .btn--icon:hover { color: var(--ink); border-color: color-mix(in oklch, var(--ink) 22%, transparent); }

    /* ---------- error ---------- */
    .err {
      position: fixed; inset: 0; z-index: var(--z-err);
      display: none; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .err__box {
      text-align: center; padding: 32px 40px;
      border: 1px solid color-mix(in oklch, var(--error) 45%, transparent);
      background: color-mix(in oklch, var(--error) 8%, var(--bg));
      border-radius: 14px; max-width: 420px;
    }
    .err__title { font-size: 1rem; font-weight: 600; color: var(--error); margin-bottom: 8px; }
    .err__sub { font-size: 0.82rem; color: var(--ink-2); line-height: 1.5; }

    /* ---------- related drawer ---------- */
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: 340px;
      background: oklch(0.14 0.005 75 / 0.96);
      border-left: 1px solid var(--line);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      z-index: var(--z-drawer);
      transform: translateX(100%); pointer-events: none;
      transition: transform .28s ease;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .drawer.open { transform: none; pointer-events: auto; }
    .drawer__head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 16px 12px; border-bottom: 1px solid var(--line); flex-shrink: 0;
    }
    .drawer__title { font-size: 0.9rem; font-weight: 600; letter-spacing: -0.01em; }
    .drawer__body { overflow-y: auto; padding: 4px 0 24px; }
    .drawer__hint { padding: 22px 18px; font-size: 0.8rem; color: var(--ink-3); }
    .drawer__sec {
      padding: 14px 16px 6px; font-size: 0.66rem; letter-spacing: 0.08em;
      text-transform: lowercase; color: var(--ink-3);
    }
    .rel {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 16px; text-decoration: none; color: var(--ink);
      transition: background .15s ease;
    }
    .rel:hover { background: var(--surface); }
    .rel__thumb {
      width: 72px; height: 42px; border-radius: 5px; object-fit: cover;
      background: oklch(0 0 0 / 0.3); flex-shrink: 0;
    }
    .rel__name {
      font-size: 0.82rem; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    @media (max-width: 600px) {
      .page { padding: 12px 14px; }
      .btn span { display: none; }
      .btn { padding: 7px; width: 32px; height: 32px; justify-content: center; }
      .drawer { width: 86vw; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
  <link rel="stylesheet" href="/static/edit.css">
</head>
<body>
  <div class="page">
    <nav class="crumb" id="crumb" aria-label="路径"></nav>

    <div class="card">
      <video id="v" controls autoplay preload="metadata" src="/api/stream/{{ path }}"></video>
      <div class="badge" id="badge">2.0×</div>
      <div class="spinner" id="spinner"></div>
    </div>

    <div class="info">
      <span class="info__name">{{ name }}</span>
      <div class="info__tags" id="chromeTags"></div>
      <div class="info__actions">
        <label class="autonext" title="看完自动播放同文件夹下一个">
          <input type="checkbox" id="autoNext">
          <span class="autonext__track"><span class="autonext__thumb"></span></span>
          <span class="autonext__label">自动下一个</span>
        </label>
        <button class="btn btn--primary" id="related" aria-label="相关视频">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          <span>列表</span>
        </button>
        <button class="btn" id="edit" aria-label="编辑">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
          <span>编辑</span>
        </button>
        <button class="btn btn--icon" id="close" aria-label="关闭" title="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="err" id="err">
    <div class="err__box">
      <div class="err__title" id="err__title">播放出错</div>
      <div class="err__sub" id="err__sub"></div>
      <button class="btn" id="err__retry" style="margin-top:18px;">重试</button>
    </div>
  </div>

  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer__head">
      <span class="drawer__title">相关视频</span>
      <button class="btn btn--icon" id="drawerClose" aria-label="关闭" style="width:28px;height:28px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
    </div>
    <div class="drawer__body" id="drawerBody"></div>
  </aside>

  <script src="/static/edit.js"></script>
  <script>
    const v = document.getElementById('v');
    const badge = document.getElementById('badge');

    const PATH = {{ path|tojson }};
    const NAME = {{ name|tojson }};

    // ---- 面包屑(首页 / 各级目录 / 文件名) ----
    (function renderCrumb() {
      const parts = String(PATH).split('/');
      let html = '<a class="crumb__home" href="/">首页</a>';
      parts.forEach((seg, i) => {
        const isLast = i === parts.length - 1;
        html += '<span class="crumb__sep">/</span>' +
          (isLast
            ? `<span class="crumb__cur">${escapeHtml(seg)}</span>`
            : `<span class="crumb__seg">${escapeHtml(seg)}</span>`);
      });
      document.getElementById('crumb').innerHTML = html;
    })();

    // ---- 错误重试 + 转圈(慢链路下 seek 的 Range 易快速失败) ----
    const spinner = document.getElementById('spinner');
    const showSpinner = () => spinner.style.display = 'flex';
    const hideSpinner = () => spinner.style.display = 'none';
    const MAX_RETRY = 3;
    let seekRetry = 0;

    // 原生控制条在 seeking/waiting 自带转圈,此时关掉自定义圈避免双圈;
    // 自定义圈只在"出错重试的退避间隙"显示(那时原生不转)。
    v.addEventListener('seeking', hideSpinner);
    v.addEventListener('waiting', hideSpinner);
    v.addEventListener('seeked', () => { hideSpinner(); seekRetry = 0; });
    v.addEventListener('canplay', () => { hideSpinner(); seekRetry = 0; });
    v.addEventListener('playing', () => { hideSpinner(); seekRetry = 0; });

    const ERR_MAP = {
      2: ['网络中断', '多次重试仍拉取失败,可能是带宽不足或连接被切断。'],
      3: ['解码失败', '视频数据出错或文件损坏,可重试或换用 Chrome / Edge。'],
      4: ['无法播放此格式', '当前浏览器不支持该视频编码,请换用 Chrome / Edge。'],
    };
    function showErr(code) {
      hideSpinner();
      const [title, sub] = ERR_MAP[code] || ['播放出错', '发生了未知错误,可重试或换用 Chrome / Edge。'];
      document.getElementById('err__title').textContent = title;
      document.getElementById('err__sub').textContent = sub;
      document.getElementById('err__retry').style.display = (code === 4) ? 'none' : 'inline-flex';
      document.getElementById('err').style.display = 'flex';
    }

    let pendingSeek = -1;
    v.addEventListener('loadedmetadata', () => {
      if (pendingSeek >= 0) { v.currentTime = pendingSeek; pendingSeek = -1; return; }
      // 续播:错误重试路径让位给 pendingSeek;否则查 localStorage
      const rec = getProgress(PATH);
      if (rec && isFinite(rec.t) && isFinite(rec.d)
          && rec.t > RESUME_MARGIN && rec.t < rec.d - RESUME_MARGIN) {
        v.currentTime = rec.t;
      }
    });
    function reloadAt(t, delay) {
      pendingSeek = t;
      const go = () => { hideSpinner(); v.load(); v.play().catch(() => {}); };
      if (delay) setTimeout(go, delay); else go();
    }

    v.addEventListener('error', () => {
      const code = v.error ? v.error.code : 0;
      if (code === 1) return;                          // ABORTED:中止非真错误
      if ((code === 2 || code === 3) && seekRetry < MAX_RETRY) {
        seekRetry++;
        showSpinner();
        reloadAt(v.currentTime || 0, 400 * seekRetry);  // 退避 0.4/0.8/1.2s
        return;
      }
      showErr(code);
    });

    document.getElementById('err__retry').addEventListener('click', () => {
      seekRetry = 0;                                    // 手动重试给满次数
      document.getElementById('err').style.display = 'none';
      showSpinner();
      reloadAt(v.currentTime || 0, 0);
    });

    // ---- 记住播放进度(localStorage,per-browser;不跨设备同步) ----
    // ponytail: per-browser,不跨设备同步;如需同步改服务端 SQLite + progress 表
    // + rename/move/delete 钩子(同 meta.relocate_path 现有模式)。
    const PROGRESS_KEY = 'vflow:progress';
    const PROGRESS_MAX = 200;          // 上限条数,超限按 ts 删最旧
    const RESUME_MARGIN = 10;          // 首/末 10 秒内不续播
    function readProgressMap() {
      try { return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}'); }
      catch (e) { return {}; }
    }
    function getProgress(path) { return readProgressMap()[path]; }
    function saveProgress(path, t, d) {
      if (!isFinite(t) || t <= 0 || !isFinite(d) || d <= 0) return;
      const map = readProgressMap();
      map[path] = { t, d, ts: Date.now() };
      const keys = Object.keys(map);
      if (keys.length > PROGRESS_MAX) {
        keys.sort((a, b) => map[a].ts - map[b].ts);
        for (let i = 0; i < keys.length - PROGRESS_MAX; i++) delete map[keys[i]];
      }
      try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(map)); } catch (e) {}
    }
    function clearProgress(path) {
      const map = readProgressMap();
      if (!map[path]) return;
      delete map[path];
      try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(map)); } catch (e) {}
    }
    // 写入:每 5s 轮询 + 暂停 + 离页(刷新由 pagehide/beforeunload 覆盖)
    setInterval(() => saveProgress(PATH, v.currentTime, v.duration), 5000);
    v.addEventListener('pause', () => saveProgress(PATH, v.currentTime, v.duration));
    const _onHide = () => saveProgress(PATH, v.currentTime, v.duration);
    window.addEventListener('pagehide', _onHide);
    window.addEventListener('beforeunload', _onHide);
    // 看完 -> 清掉,下次从头放
    v.addEventListener('ended', () => clearProgress(PATH));

    // ---- 自动播放下一个(看完自动跳同文件夹下一个) ----
    const autoNextEl = document.getElementById('autoNext');
    const AUTONEXT_KEY = 'vflow:autonext';
    autoNextEl.checked = localStorage.getItem(AUTONEXT_KEY) === '1';
    autoNextEl.addEventListener('change', () => {
      localStorage.setItem(AUTONEXT_KEY, autoNextEl.checked ? '1' : '0');
    });
    // ponytail: /api/related 的 folder 已排除自身,且服务端按名字排序
    // (scan_dir 字典序 / netstore 按 name.lower())。用原生 > 比对而非
    // localeCompare —— 后者按区域/数字感知,与浏览列表(服务端字典序)
    // 不一致,会让 E1→E10 而非 E1→E2。用 > 保证自动下一页顺序 == 列表顺序。
    // netstore 的 lower() 仅在名字仅大小写不同时偶有差异,可接受。
    v.addEventListener('ended', () => {
      if (!autoNextEl.checked) return;
      fetch('/api/related?path=' + encodeURIComponent(PATH))
        .then(r => r.json())
        .then(d => {
          const next = (d.folder || []).find(s => s.name > NAME);
          if (next) location.href = '/play/' + encodeURI(next.path);
        })
        .catch(() => {});
    });

    document.getElementById('close').addEventListener('click', () => window.close());

    // ---- 编辑:标签 / 改名 / 移动 ----
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function renderTags(tags) {
      document.getElementById('chromeTags').innerHTML =
        (tags || []).map(t => `<span class="t">${escapeHtml(t)}</span>`).join('');
    }
    async function loadMeta() {
      try {
        const r = await fetch('/api/meta?path=' + encodeURIComponent(PATH));
        const d = await r.json();
        renderTags(d.tags || []);
      } catch (e) { /* ignore */ }
    }
    document.getElementById('edit').addEventListener('click', () => {
      VflowEdit.open({
        path: PATH, name: NAME,
        // 改名/移动改变路径,流地址绑定旧路径 -> 重新加载(接受丢失播放进度)
        onRenamed: np => { location.href = '/play/' + encodeURI(np); },
        onMoved: np => { location.href = '/play/' + encodeURI(np); },
        // 标签变更原地更新
        onChanged: renderTags,
        // 视频已删 -> 关闭此标签页(由 window.open 打开,可关闭);关不掉则回首页
        onDelete: () => { window.close(); location.href = '/'; }
      });
    });
    loadMeta();

    // ---- 相关视频抽屉(同标签并集 + 同文件夹) ----
    // ponytail: 缩略图占位时不自动重试,/api/thumb 已 warm 后台,下次打开即有真图。
    const drawer = document.getElementById('drawer');
    const drawerBody = document.getElementById('drawerBody');
    let relatedLoaded = false;

    function setDrawer(open) {
      drawer.classList.toggle('open', open);
      drawer.setAttribute('aria-hidden', open ? 'false' : 'true');
    }
    function renderGroup(title, list) {
      if (!list || !list.length) return '';
      const items = list.map(v => `
        <a class="rel" href="/play/${encodeURI(v.path)}">
          <img class="rel__thumb" src="/api/thumb/${encodeURI(v.path)}" loading="lazy" alt="" onerror="this.remove()">
          <span class="rel__name">${escapeHtml(v.name)}</span>
        </a>`).join('');
      return `<div class="drawer__sec">${title} · ${list.length}</div>${items}`;
    }
    async function loadRelated() {
      drawerBody.innerHTML = '<div class="drawer__hint">加载中…</div>';
      try {
        const r = await fetch('/api/related?path=' + encodeURIComponent(PATH));
        const d = await r.json();
        relatedLoaded = true;
        const html = renderGroup('同标签', d.tagged) + renderGroup('同文件夹', d.folder);
        drawerBody.innerHTML = html || '<div class="drawer__hint">无相关视频</div>';
      } catch (e) {
        drawerBody.innerHTML = '<div class="drawer__hint">加载失败</div>';
      }
    }
    document.getElementById('related').addEventListener('click', () => {
      const open = !drawer.classList.contains('open');
      setDrawer(open);
      if (open && !relatedLoaded) loadRelated();
    });
    document.getElementById('drawerClose').addEventListener('click', () => setDrawer(false));
    // 点击抽屉外空白处收起(排除抽屉自身与「列表」按钮,后者自有 toggle 逻辑)
    document.addEventListener('click', e => {
      if (!drawer.classList.contains('open')) return;
      if (drawer.contains(e.target) || e.target.closest('#related')) return;
      setDrawer(false);
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && drawer.classList.contains('open')) setDrawer(false);
    });

    // ---- 长按 2x ----
    let pressTimer = null, prevRate = 1, speeding = false, suppressClick = false;
    const CTRL_BAR_H = 50;  // 底部原生控制条高度,长按此处不触发倍速

    function startPress(e) {
      // 排除底部控制条区域(避免拖动进度条被误判)
      const rect = v.getBoundingClientRect();
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
      if (y > rect.height - CTRL_BAR_H) return;
      if (pressTimer) return;
      pressTimer = setTimeout(() => {
        speeding = true;
        prevRate = v.playbackRate;
        v.playbackRate = 2;
        badge.classList.add('show');
      }, 150);
    }
    function endPress() {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      if (speeding) {
        v.playbackRate = prevRate; speeding = false; badge.classList.remove('show');
        // 松开后浏览器会派发 click,触发原生暂停/播放,吞掉它
        suppressClick = true;
        setTimeout(() => { suppressClick = false; }, 300);
      }
    }
    v.addEventListener('mousedown', startPress);
    v.addEventListener('mouseup', endPress);
    v.addEventListener('mouseleave', endPress);
    v.addEventListener('touchstart', startPress, { passive: true });
    v.addEventListener('touchend', endPress);
    v.addEventListener('touchcancel', endPress);
    // 手机长按会触发系统菜单(下载等),阻止掉
    v.addEventListener('contextmenu', e => e.preventDefault());
    // 长按松开引发的 click 会触发原生暂停,在捕获阶段吞掉
    v.addEventListener('click', e => {
      if (suppressClick) { e.preventDefault(); e.stopPropagation(); }
    }, true);

    // ---- 快捷键 ----
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      const step = e.shiftKey ? 10 : 5;
      switch (e.key) {
        case 'ArrowLeft':  v.currentTime = Math.max(0, v.currentTime - step); break;
        case 'ArrowRight': v.currentTime = Math.min(v.duration || 0, v.currentTime + step); break;
        case ' ':
          e.preventDefault();
          if (v.paused) v.play(); else v.pause();
          break;
      }
    });
  </script>
</body>
</html>
