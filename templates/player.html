<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ name }} · V-flow</title>
  <style>
    :root {
      --bg:        oklch(0.12 0.004 75);
      --ink:       oklch(0.96 0.004 90);
      --ink-2:     oklch(0.78 0.006 80);
      --ink-3:     oklch(0.60 0.006 80);
      --line:      oklch(0.96 0.004 90 / 0.14);
      --surface:   oklch(0.205 0.006 75 / 0.6);
      --accent:    oklch(0.84 0.13 70);
      --accent-ink:oklch(0.20 0.02 70);
      --error:     oklch(0.78 0.15 25);
      --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      --z-chrome: 100;
      --z-badge: 200;
      --z-err: 300;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    button { font: inherit; color: inherit; }

    .stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    video {
      max-width: 100vw; max-height: 100vh;  /* 适应原视频大小:按固有尺寸显示,超大才等比缩小 */
      display: block; background: var(--bg);
    }

    /* ---------- chrome (auto-hides on idle) ---------- */
    .chrome {
      position: fixed; top: 0; left: 0; right: 0; z-index: var(--z-chrome);
      display: flex; align-items: center; gap: 16px;
      padding: 18px 22px;
      background: linear-gradient(to bottom, oklch(0.08 0 0 / 0.7), oklch(0.08 0 0 / 0));
      transition: opacity .35s ease;
    }
    .chrome.is-hidden { opacity: 0; pointer-events: none; }

    .chrome__title {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; gap: 2px;
    }
    .chrome__name {
      font-size: 0.95rem; font-weight: 600; letter-spacing: -0.01em;
      color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-shadow: 0 1px 8px oklch(0 0 0 / 0.5);
    }
    .chrome__sub {
      font-size: 0.68rem; letter-spacing: 0.08em; text-transform: lowercase;
      color: var(--ink-3);
    }

    .close {
      appearance: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px; border-radius: 999px;
      background: var(--surface); border: 1px solid var(--line);
      color: var(--ink); font-size: 0.8rem;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: background .18s ease, border-color .18s ease, color .18s ease;
      flex-shrink: 0;
    }
    .close:hover { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
    .close svg { width: 14px; height: 14px; }
    .close:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ---------- speed badge ---------- */
    .badge {
      position: fixed; top: 76px; right: 22px; z-index: var(--z-badge);
      background: var(--accent); color: var(--accent-ink);
      font-weight: 700; font-size: 0.82rem; letter-spacing: -0.01em;
      padding: 5px 11px; border-radius: 7px;
      box-shadow: 0 6px 20px oklch(0 0 0 / 0.4);
      opacity: 0; transform: translateY(-4px) scale(0.96);
      transition: opacity .15s ease, transform .15s ease;
      font-variant-numeric: tabular-nums;
    }
    .badge.show { opacity: 1; transform: none; }

    /* ---------- buffering spinner ---------- */
    .spinner {
      position: fixed; inset: 0; z-index: 150;   /* video/chrome 之上,err(300) 之下 */
      display: none; align-items: center; justify-content: center;
      pointer-events: none;                        /* 不挡原生控制条 / 时间轴点击 */
    }
    .spinner::before {
      content: ''; width: 46px; height: 46px;
      border: 3px solid oklch(0.96 0.004 90 / 0.22);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- error ---------- */
    .err {
      position: fixed; inset: 0; z-index: var(--z-err);
      display: none; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .err__box {
      text-align: center; padding: 32px 40px;
      border: 1px solid color-mix(in oklch, var(--error) 45%, transparent);
      background: color-mix(in oklch, var(--error) 8%, var(--bg));
      border-radius: 14px; max-width: 420px;
    }
    .err__title { font-size: 1rem; font-weight: 600; color: var(--error); margin-bottom: 8px; }
    .err__sub { font-size: 0.82rem; color: var(--ink-2); line-height: 1.5; }

    /* ---------- title tag chips ---------- */
    .chrome__tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; max-width: 60vw; }
    .chrome__tags:empty { display: none; }
    .chrome__tags .t {
      font-size: 0.66rem; color: var(--ink-2);
      border: 1px solid var(--line); border-radius: 999px; padding: 1px 8px;
      background: oklch(0.1 0 0 / 0.4);
    }

    @media (max-width: 600px) {
      .chrome { padding: 14px 16px; gap: 10px; }
      .close span { display: none; }
      .close { padding: 8px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
  <link rel="stylesheet" href="/static/edit.css">
</head>
<body>
  <div class="stage">
    <video id="v" controls autoplay preload="metadata" src="/api/stream/{{ path }}"></video>
  </div>

  <div class="chrome" id="chrome">
    <div class="chrome__title">
      <span class="chrome__name">{{ name }}</span>
      <span class="chrome__sub">v-flow · 播放</span>
      <div class="chrome__tags" id="chromeTags"></div>
    </div>
    <button class="close" id="edit" aria-label="编辑">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      <span>编辑</span>
    </button>
    <button class="close" id="close" aria-label="关闭">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="18" y1="6" x2="6" y2="18"></line></svg>
      <span>关闭</span>
    </button>
  </div>

  <div class="badge" id="badge">2.0×</div>

  <div class="spinner" id="spinner"></div>

  <div class="err" id="err">
    <div class="err__box">
      <div class="err__title" id="err__title">播放出错</div>
      <div class="err__sub" id="err__sub"></div>
      <button class="close" id="err__retry" style="margin-top:18px;">重试</button>
    </div>
  </div>

  <script src="/static/edit.js"></script>
  <script>
    const v = document.getElementById('v');
    const badge = document.getElementById('badge');
    const chromeEl = document.getElementById('chrome');
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const PATH = {{ path|tojson }};
    const NAME = {{ name|tojson }};

    // ponytail: 慢链路下 seek 的 Range 易快速失败(RST/504),<video> 直接 error 不转圈。
    // 改法:seeking/waiting 显示转圈;error(code 2/3) 先静默重试并保持转圈,用尽次数才报错。
    const spinner = document.getElementById('spinner');
    const showSpinner = () => spinner.style.display = 'flex';
    const hideSpinner = () => spinner.style.display = 'none';
    const MAX_RETRY = 3;
    let seekRetry = 0;

    // 原生控制条在 seeking/waiting 自带转圈,此时关掉自定义圈避免双圈;
    // 自定义圈只在"出错重试的退避间隙"显示(那时原生不转)。
    v.addEventListener('seeking', hideSpinner);
    v.addEventListener('waiting', hideSpinner);
    v.addEventListener('seeked', () => { hideSpinner(); seekRetry = 0; });
    v.addEventListener('canplay', () => { hideSpinner(); seekRetry = 0; });
    v.addEventListener('playing', () => { hideSpinner(); seekRetry = 0; });

    const ERR_MAP = {
      2: ['网络中断', '多次重试仍拉取失败,可能是带宽不足或连接被切断。'],
      3: ['解码失败', '视频数据出错或文件损坏,可重试或换用 Chrome / Edge。'],
      4: ['无法播放此格式', '当前浏览器不支持该视频编码,请换用 Chrome / Edge。'],
    };
    function showErr(code) {
      hideSpinner();
      const [title, sub] = ERR_MAP[code] || ['播放出错', '发生了未知错误,可重试或换用 Chrome / Edge。'];
      document.getElementById('err__title').textContent = title;
      document.getElementById('err__sub').textContent = sub;
      document.getElementById('err__retry').style.display = (code === 4) ? 'none' : 'inline-flex';
      document.getElementById('err').style.display = 'flex';
    }

    let pendingSeek = -1;
    v.addEventListener('loadedmetadata', () => {
      if (pendingSeek >= 0) { v.currentTime = pendingSeek; pendingSeek = -1; }
    });
    function reloadAt(t, delay) {
      pendingSeek = t;
      const go = () => { hideSpinner(); v.load(); v.play().catch(() => {}); };
      if (delay) setTimeout(go, delay); else go();
    }

    v.addEventListener('error', () => {
      const code = v.error ? v.error.code : 0;
      if (code === 1) return;                          // ABORTED:中止非真错误
      if ((code === 2 || code === 3) && seekRetry < MAX_RETRY) {
        seekRetry++;
        showSpinner();
        reloadAt(v.currentTime || 0, 400 * seekRetry);  // 退避 0.4/0.8/1.2s
        return;
      }
      showErr(code);
    });

    document.getElementById('err__retry').addEventListener('click', () => {
      seekRetry = 0;                                    // 手动重试给满次数
      document.getElementById('err').style.display = 'none';
      showSpinner();
      reloadAt(v.currentTime || 0, 0);
    });

    document.getElementById('close').addEventListener('click', () => window.close());

    // ---- 编辑:标签 / 改名 / 移动 ----
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function renderTags(tags) {
      document.getElementById('chromeTags').innerHTML =
        (tags || []).map(t => `<span class="t">${escapeHtml(t)}</span>`).join('');
    }
    async function loadMeta() {
      try {
        const r = await fetch('/api/meta?path=' + encodeURIComponent(PATH));
        const d = await r.json();
        renderTags(d.tags || []);
      } catch (e) { /* ignore */ }
    }
    document.getElementById('edit').addEventListener('click', () => {
      if (typeof ping === 'function') ping();
      VflowEdit.open({
        path: PATH, name: NAME,
        // 改名/移动改变路径,流地址绑定旧路径 -> 重新加载(接受丢失播放进度)
        onRenamed: np => { location.href = '/play/' + encodeURI(np); },
        onMoved: np => { location.href = '/play/' + encodeURI(np); },
        // 标签变更原地更新
        onChanged: renderTags,
        // 视频已删 -> 关闭此标签页(由 window.open 打开,可关闭);关不掉则回首页
        onDelete: () => { window.close(); location.href = '/'; }
      });
    });
    loadMeta();

    // ---- chrome 自动隐藏(无操作时淡出,鼠标移动恢复) ----
    let idleTimer = null;
    function ping() {
      chromeEl.classList.remove('is-hidden');
      if (idleTimer) clearTimeout(idleTimer);
      if (!reduceMotion) {
        idleTimer = setTimeout(() => chromeEl.classList.add('is-hidden'), 2800);
      }
    }
    if (!reduceMotion) {
      document.addEventListener('mousemove', ping);
      ping();
    }

    // ---- 长按 2x ----
    let pressTimer = null, prevRate = 1, speeding = false, suppressClick = false;
    const CTRL_BAR_H = 50;  // 底部原生控制条高度,长按此处不触发倍速

    function startPress(e) {
      // 排除底部控制条区域(避免拖动进度条被误判)
      const rect = v.getBoundingClientRect();
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
      if (y > rect.height - CTRL_BAR_H) return;
      if (pressTimer) return;
      pressTimer = setTimeout(() => {
        speeding = true;
        prevRate = v.playbackRate;
        v.playbackRate = 2;
        badge.classList.add('show');
      }, 150);
    }
    function endPress() {
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      if (speeding) {
        v.playbackRate = prevRate; speeding = false; badge.classList.remove('show');
        // 松开后浏览器会派发 click,触发原生暂停/播放,吞掉它
        suppressClick = true;
        setTimeout(() => { suppressClick = false; }, 300);
      }
    }
    v.addEventListener('mousedown', startPress);
    v.addEventListener('mouseup', endPress);
    v.addEventListener('mouseleave', endPress);
    v.addEventListener('touchstart', startPress, { passive: true });
    v.addEventListener('touchend', endPress);
    v.addEventListener('touchcancel', endPress);
    // 长按松开引发的 click 会触发原生暂停,在捕获阶段吞掉
    v.addEventListener('click', e => {
      if (suppressClick) { e.preventDefault(); e.stopPropagation(); }
    }, true);

    // ---- 快捷键 ----
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      const step = e.shiftKey ? 10 : 5;
      switch (e.key) {
        case 'ArrowLeft':  v.currentTime = Math.max(0, v.currentTime - step); break;
        case 'ArrowRight': v.currentTime = Math.min(v.duration || 0, v.currentTime + step); break;
        case ' ':
          e.preventDefault();
          if (v.paused) v.play(); else v.pause();
          break;
      }
    });
  </script>
</body>
</html>
