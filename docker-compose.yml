# V-flow 一键部署
# 用法:把下面的 D:/Videos 改成你自己的视频文件夹,然后:
#   1) 首次(或环境变化时)构建基础镜像一次:
#        docker build -t vflow-base -f Dockerfile.base .
#   2) 之后每次只需:
#        docker compose up -d --build      # 应用镜像基于 vflow-base,秒级构建
services:
  vflow:
    build: .
    image: vflow
    container_name: vflow
    # 从 .env 读取环境变量(网盘等;见 .env.example)。文件不存在则忽略,网盘默认关闭。
    env_file:
      - path: .env
        required: false
    # 容器经 host.docker.internal 访问宿主机服务(如本机 OpenList 的 5244)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5000:5000"
    volumes:
      # —— 外部视频文件夹 → 容器 /video ——
      - type: bind
        source: D:/Videos          # 改成你的视频文件夹
        target: /app/video
        # read_only: true          # 想保护库不被改名/移动时取消注释
      # —— 缓存持久化(缩略图 / 标签库)——
      - vflow-thumbs:/app/.thumbs
      - vflow-meta:/app/.meta
    restart: unless-stopped

volumes:
  vflow-thumbs:
  vflow-meta:
